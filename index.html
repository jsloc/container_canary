// ──────────────────────────────────────────────────────────────────────────
// Hand-drawn cartoon shipping container
// ──────────────────────────────────────────────────────────────────────────
function Container({ color = '#FFD60A', stroke = '#0B0B0B', width = 180, tilt = 0, label = 'CANARY', door = 'right' }) {
  const w = 160, h = 90;
  const path = `
    M 6 6
    Q 4 4 8 3
    L ${w - 8} 4
    Q ${w - 2} 4 ${w - 3} 9
    L ${w - 2} ${h - 6}
    Q ${w - 2} ${h - 2} ${w - 7} ${h - 2}
    L 8 ${h - 3}
    Q 3 ${h - 2} 4 ${h - 8}
    L 3 9
    Q 3 5 6 6
    Z
  `;

  const corrugations = [];
  const corrCount = 14;
  for (let i = 1; i < corrCount; i++) {
    const x = (w / corrCount) * i + (Math.sin(i) * 0.8);
    corrugations.push(
      <path key={i} d={`M ${x} 10 Q ${x + 0.5} ${h/2} ${x - 0.3} ${h - 6}`} stroke={stroke} strokeWidth="1" fill="none" strokeLinecap="round" opacity="0.55"/>
    );
  }

  return (
    <svg viewBox={`-4 -4 ${w + 8} ${h + 8}`} width={width} style={{ transform: `rotate(${tilt}deg)`, transformOrigin: 'center', overflow: 'visible' }}>
      <ellipse cx={w / 2} cy={h + 4} rx={w / 2.2} ry="2.5" fill="rgba(0,0,0,0.08)"/>
      <path d={path} fill={color} stroke={stroke} strokeWidth="2.6" strokeLinejoin="round" strokeLinecap="round"/>
      <path d={`M 5 8 Q ${w/2} 6 ${w - 5} 8`} stroke={stroke} strokeWidth="1.6" fill="none" strokeLinecap="round"/>
      {corrugations}
      {door === 'right' && (
        <>
          <line x1={w - 40} y1="8" x2={w - 40} y2={h - 4} stroke={stroke} strokeWidth="1.8" strokeLinecap="round"/>
          <line x1={w - 30} y1="18" x2={w - 29} y2={h - 12} stroke={stroke} strokeWidth="1.5" strokeLinecap="round"/>
          <line x1={w - 20} y1="18" x2={w - 19} y2={h - 12} stroke={stroke} strokeWidth="1.5" strokeLinecap="round"/>
          <circle cx={w - 30} cy={h/2} r="1.8" fill={stroke}/>
          <circle cx={w - 20} cy={h/2} r="1.8" fill={stroke}/>
        </>
      )}
      <text x="14" y={h/2 + 4} fill={stroke} fontSize="11" fontFamily="'Caveat', 'Comic Sans MS', cursive" fontWeight="700" letterSpacing="0.5">{label}</text>
      <rect x="1" y="1" width="7" height="7" fill="none" stroke={stroke} strokeWidth="1.6" rx="1"/>
      <rect x={w - 8} y="1" width="7" height="7" fill="none" stroke={stroke} strokeWidth="1.6" rx="1"/>
      <rect x="1" y={h - 8} width="7" height="7" fill="none" stroke={stroke} strokeWidth="1.6" rx="1"/>
      <rect x={w - 8} y={h - 8} width="7" height="7" fill="none" stroke={stroke} strokeWidth="1.6" rx="1"/>
    </svg>
  );
}

  return (
    <svg viewBox={`0 0 ${width} ${height}`} width="100%" height="100%" style={{ overflow: 'visible' }}>
      <path d={`M 0 ${height - 8} Q ${width/2} ${height - 4} ${width} ${height - 10}`} stroke={stroke} strokeWidth="2.5" fill="none" strokeLinecap="round"/>

      <line x1={width - 150} y1={(height - 8 + 60) / 2 + 10} x2={width - 95} y2={(height - 8 + 60) / 2 - 10} stroke={stroke} strokeWidth="2" strokeLinecap="round"/>
      <path d={`M 100 58 Q ${width/2} 54 ${width - 100} 58 L ${width - 100} 78 Q ${width/2} 82 100 78 Z`} fill={accent} stroke={stroke} strokeWidth="2.8" strokeLinejoin="round"/>
      {[0.15, 0.3, 0.45, 0.55, 0.7, 0.85].map((p, i) => {
        const x = 100 + (width - 200) * p;
        return <line key={i} x1={x} y1="60" x2={x + (i%2 ? 8 : -8)} y2="76" stroke={stroke} strokeWidth="1.2" opacity="0.7" strokeLinecap="round"/>;
      })}
      <g>
        <path d={`M ${hookX - 26} 58 L ${hookX - 26} 38 Q ${hookX - 24} 32 ${hookX - 18} 32 L ${hookX + 18} 32 Q ${hookX + 24} 32 ${hookX + 26} 38 L ${hookX + 26} 58`} fill="white" stroke={stroke} strokeWidth="2.4" strokeLinejoin="round"/>
        <rect x={hookX - 20} y="37" width="40" height="14" rx="2" fill="#e8f4ff" stroke={stroke} strokeWidth="1.6"/>
        <line x1={hookX} y1="37" x2={hookX} y2="51" stroke={stroke} strokeWidth="1.3"/>

        <line x1={hookX + 45} y1="206" x2={hookX + 45} y2="218" stroke={stroke} strokeWidth="1.8" strokeLinecap="round"/>
      </g>
    </svg>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// Contact form
// ──────────────────────────────────────────────────────────────────────────
function ContactForm({ ink, yellow, cream }) {
  const [form, setForm] = React.useState({ email: '', company: '', container: "40' HC", message: '' });
  const [sent, setSent] = React.useState(false);

  const field = (label, input) => (
    <label style={{ display: 'block', marginBottom: 18 }}>
      <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 6, color: ink, textTransform: 'uppercase', letterSpacing: 1 }}>{label}</div>
      {input}
    </label>
  );

  const inputStyle = {
    width: '100%',
    padding: '14px 16px',
    fontSize: 16,
    border: `2.5px solid ${ink}`,
    borderRadius: 12,
    background: cream,
    color: ink,
    fontFamily: 'inherit',
    boxSizing: 'border-box',
    outline: 'none',
  };

  if (sent) {
    return (
      <div style={{ background: cream, border: `2.5px solid ${ink}`, borderRadius: 20, padding: 40, boxShadow: `5px 5px 0 ${ink}`, textAlign: 'center' }}>
        <div style={{ fontSize: 72, marginBottom: 8 }}>🐦</div>
        <h3 style={{ fontFamily: "'Caveat', cursive", fontSize: 48, margin: 0, color: ink }}>On its way!</h3>
        <p style={{ fontSize: 16, color: ink, opacity: 0.7 }}>We'll get back within 24 hours.</p>
      </div>
    );
  }

  return (
    <form onSubmit={(e) => { e.preventDefault(); setSent(true); }} style={{ background: cream, border: `2.5px solid ${ink}`, borderRadius: 20, padding: 28, boxShadow: `5px 5px 0 ${ink}` }}>
      {field('Email', <input type="email" required value={form.email} onChange={(e) => setForm({ ...form, email: e.target.value })} style={inputStyle} placeholder="you@company.com"/>)}
      {field('Company', <input type="text" required value={form.company} onChange={(e) => setForm({ ...form, company: e.target.value })} style={inputStyle} placeholder="Acme Logistics"/>)}
      {field('Container type needed', (
        <select value={form.container} onChange={(e) => setForm({ ...form, container: e.target.value })} style={{ ...inputStyle, appearance: 'none', backgroundImage: `url("data:image/svg+xml,%3Csvg width='12' height='8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' fill='none' stroke='%230B0B0B' stroke-width='2'/%3E%3C/svg%3E")`, backgroundRepeat: 'no-repeat', backgroundPosition: 'right 16px center', paddingRight: 40 }}>
          <option>20' Standard Dry</option>
          <option>40' Standard Dry</option>
          <option>20' High Cube</option>
          <option>40' High Cube</option>
          <option>Custom Modification</option>
          <option>Bulk / Fleet order</option>
          <option>Not sure yet</option>
        </select>
      ))}
      {field('Message / notes', <textarea required value={form.message} onChange={(e) => setForm({ ...form, message: e.target.value })} rows={4} style={{ ...inputStyle, resize: 'vertical', fontFamily: 'inherit' }} placeholder="Quantity, origin, destination, timeline..."/>)}
      <button type="submit" style={{ background: ink, color: yellow, padding: '16px 32px', borderRadius: 999, fontSize: 16, fontWeight: 700, border: `2.5px solid ${ink}`, width: '100%', cursor: 'pointer', fontFamily: 'inherit', boxShadow: `4px 4px 0 ${yellow}`, marginTop: 8 }}>Send inquiry →</button>
    </form>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// Responsive hook
// ──────────────────────────────────────────────────────────────────────────
function useIsMobile(breakpoint = 768) {
  const [m, setM] = React.useState(() => typeof window !== 'undefined' && window.innerWidth < breakpoint);
  React.useEffect(() => {
    const on = () => setM(window.innerWidth < breakpoint);
    window.addEventListener('resize', on);
    return () => window.removeEventListener('resize', on);
  }, [breakpoint]);
  return m;
}

// ──────────────────────────────────────────────────────────────────────────
// Landing page — "Paper & Notebook" combined direction
// ──────────────────────────────────────────────────────────────────────────
function Landing() {
  const isMobile = useIsMobile();
  const ink = '#0B0B0B';
  const yellow = '#FFD60A';
  const muted = '#5a5149';
  const paper = '#FAF6E8';
  const ruled = `repeating-linear-gradient(to bottom, transparent 0, transparent 31px, rgba(11,11,11,0.08) 32px, rgba(11,11,11,0.08) 33px)`;

  const [phase, setPhase] = React.useState(0);
  React.useEffect(() => {
    let raf;
    const start = performance.now();
    const duration = 6000;
    const tick = (t) => { setPhase(((t - start) % duration) / duration); raf = requestAnimationFrame(tick); };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);

  const swing = Math.sin(phase * Math.PI * 2) * 12;
  const hookX = 400 + Math.sin(phase * Math.PI * 2) * 160;
  const containerLift = phase > 0.15 && phase < 0.85 ? 1 : 0;
  const hangY = 78 + 120 + containerLift * 20;

  const padL = isMobile ? 20 : 140;
  const padR = isMobile ? 20 : 64;

  return (
    <div style={{ width: '100%', maxWidth: 1280, background: paper, backgroundImage: ruled, fontFamily: "'Archivo', system-ui, sans-serif", color: ink, position: 'relative', overflow: 'hidden' }}>
      {!isMobile && <div style={{ position: 'absolute', left: 100, top: 0, bottom: 0, width: 2, background: 'rgba(200,40,40,0.3)' }}/>}
      {!isMobile && Array.from({ length: 14 }).map((_, i) => (
        <div key={i} style={{ position: 'absolute', left: 52, top: 80 + i * 200, width: 22, height: 22, borderRadius: 11, background: 'rgba(11,11,11,0.08)', border: `1px solid rgba(11,11,11,0.15)` }}/>
      ))}

      <nav style={{ position: 'relative', padding: `${isMobile ? 18 : 28}px ${padR}px ${isMobile ? 18 : 28}px ${padL}px`, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12, zIndex: 10 }}>
